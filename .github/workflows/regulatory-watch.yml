name: Regulatory Watch

on:
  schedule:
    - cron: "0 0 * * MON"  # 매주 월요일 UTC 00:00 (KST 09:00)
  workflow_dispatch:

jobs:
  watch:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch regulatory changes
        id: fetch
        run: |
          set +e
          python scripts/regulatory_rss.py --days 7 --verbose
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          count=$(python -c "import json; print(json.load(open('regulatory-changes.json'))['total'])")
          echo "count=${count}" >> "$GITHUB_OUTPUT"
          echo "Detected ${count} items"

      - name: Create issue if new changes
        if: steps.fetch.outputs.count != '0'
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "[Regulatory Watch] Changes detected (${{ steps.fetch.outputs.count }} items)"
          content-filepath: regulatory-changes.md
          labels: |
            regulatory-update
            automated

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regulatory-changes
          path: |
            regulatory-changes.json
            regulatory-changes.md
          retention-days: 90
