name: Validate

on:
  pull_request:
    paths:
      - "**/*.md"
      - "charts/**"
      - ".github/workflows/validate.yml"
  push:
    branches: [main]
    paths:
      - "**/*.md"
      - "charts/**"
      - ".github/workflows/validate.yml"
  workflow_dispatch:
  schedule:
    - cron: "0 3 1 */3 *"  # 분기별 외부 URL health check (1월/4월/7월/10월 1일 03:00 UTC)

jobs:
  links-and-mermaid:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: charts/package-lock.json

      - name: Install Node deps (mmdc)
        working-directory: charts
        run: npm ci

      - name: Validate internal links
        run: python charts/validate_links.py

      - name: Validate Mermaid diagrams
        run: python charts/validate_mermaid.py
        env:
          PUPPETEER_ARGS: "--no-sandbox"

  external-urls:
    runs-on: ubuntu-latest
    # 외부 URL 은 PR 마다 돌리면 rate-limit·flaky → 분기·수동만
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Check external URLs
        run: python charts/check_external_urls.py
        continue-on-error: true
